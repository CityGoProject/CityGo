# =============================================
# CityGo - Uygulama Yapılandırma Dosyası
# =============================================

# --- Sunucu Ayarları ---
# Uygulama portu (varsayılan: 8080)
# server.port=8080

# --- H2 Veritabanı Ayarları ---
# H2 dosya tabanlı modda çalışacak (veriler kalıcı olacak)
# spring.datasource.url=jdbc:h2:file:./data/citygo
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
#
# H2 Console erişimi (tarayıcıdan veritabanını görmek için)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# --- JPA / Hibernate Ayarları ---
# Tabloları otomatik oluştur/güncelle
# spring.jpa.hibernate.ddl-auto=update
# SQL sorgularını konsola yazdır (geliştirme sırasında faydalı)
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true
# H2 veritabanı dialect'i
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
