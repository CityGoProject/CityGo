# =============================================
# CityGo - Uygulama Yapılandırma Dosyası
# =============================================

# --- Sunucu Ayarları ---
server.port=8080

# --- H2 Veritabanı Ayarları ---
# Dosya tabanlı mod: veriler backend/data/ klasöründe kalıcı olarak saklanır
spring.datasource.url=jdbc:h2:file:./data/citygo
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console: tarayıcıdan http://localhost:8080/h2-console adresine gidince
# veritabanındaki tabloları ve verileri görebilirsin
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate Ayarları ---
# update = Java sınıflarına bakarak tabloları otomatik oluşturur/günceller
spring.jpa.hibernate.ddl-auto=update
# Çalışan SQL sorgularını terminale yazdırır (debug için çok faydalı)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# H2 veritabanına özel SQL dialect'i
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
